<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo | MK Vendas</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;1,900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Montserrat', sans-serif;
        background-color: #0d0d0d;
        background-image: radial-gradient(circle at top, #330000 0%, #0d0d0d 60%);
        color: #ffffff;
        min-height: 100vh;
        padding: 40px 20px;
        background-attachment: fixed;
    }

    /* Cabeçalho do Catálogo */
    .header {
        text-align: center;
        margin-bottom: 40px;
    }

    .header img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 3px solid #ff2a2a;
        box-shadow: 0 0 15px rgba(255, 42, 42, 0.6);
        margin-bottom: 15px;
    }

    .header h1 {
        font-size: 32px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-shadow: 2px 2px 0px #8a0000;
    }

    .header p {
        color: #cccccc;
        font-weight: bold;
        margin-top: 5px;
    }

    /* =======================================================
       NOVO LAYOUT: TELA DIVIDIDA
       ======================================================= */
    .layout-elite {
        display: flex;
        gap: 30px;
        max-width: 1100px;
        margin: 0 auto;
        align-items: flex-start;
    }

    /* LADO ESQUERDO: Menu de Seleção */
    .menu-lateral {
        flex: 1; /* Ocupa 1 parte do espaço */
        min-width: 280px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .btn-conta {
        background: rgba(20, 20, 20, 0.9);
        border: 1px solid #4a0000;
        color: #ffffff;
        padding: 18px 20px;
        border-radius: 10px;
        font-family: 'Montserrat', sans-serif;
        font-size: 16px;
        font-weight: bold;
        text-align: left;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
    }

    .btn-conta:hover {
        border-color: #ff2a2a;
        background: rgba(50, 0, 0, 0.8);
        transform: translateX(5px);
    }

    .btn-conta.ativo {
        background: linear-gradient(90deg, #990000, #ff2a2a);
        border-color: #ff4d4d;
        box-shadow: 0 0 15px rgba(255, 42, 42, 0.4);
        transform: translateX(10px);
    }

    /* LADO DIREITO: Painel de Detalhes */
    .painel-detalhes {
        flex: 2; /* Ocupa 2 partes do espaço (é mais largo) */
        background: rgba(20, 20, 20, 0.9);
        border: 1px solid #330000;
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        display: flex;
        flex-direction: column;
        animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .detalhe-midia {
        width: 100%;
        height: 250px;
        border-radius: 10px;
        object-fit: cover;
        margin-bottom: 25px;
        border: 2px solid #4a0000;
    }

    .detalhe-titulo {
        font-size: 28px;
        font-weight: 900;
        margin-bottom: 10px;
        color: #ffffff;
        text-transform: uppercase;
    }

    .detalhe-preco {
        font-size: 32px;
        font-weight: 900;
        color: #25D366; 
        margin-bottom: 20px;
        text-shadow: 0 0 10px rgba(37, 211, 102, 0.3);
    }

    .detalhe-descricao {
        font-size: 16px;
        color: #cccccc;
        margin-bottom: 30px;
        line-height: 1.6;
    }

    /* Botões */
    .btn-comprar {
        display: block;
        background: linear-gradient(90deg, #990000, #ff2a2a);
        color: white;
        text-align: center;
        text-decoration: none;
        padding: 18px;
        border-radius: 10px;
        font-size: 18px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: 0.2s;
        border: 1px solid #ff4d4d;
    }

    .btn-comprar:hover {
        background: linear-gradient(90deg, #ff2a2a, #ff4d4d);
        transform: scale(1.02);
        box-shadow: 0 5px 20px rgba(255, 42, 42, 0.5);
    }

    .btn-voltar {
        display: inline-block;
        margin-top: 50px;
        color: #ff2a2a;
        text-decoration: none;
        font-weight: bold;
        border: 1px solid #ff2a2a;
        padding: 10px 20px;
        border-radius: 8px;
        transition: 0.2s;
    }
    
    .btn-voltar:hover {
        background: rgba(255, 42, 42, 0.1);
    }

    /* Responsividade para Celulares */
    @media (max-width: 768px) {
        .layout-elite {
            flex-direction: column; /* Coloca um embaixo do outro no celular */
            gap: 20px;
        }
        .btn-conta.ativo {
            transform: translateY(-5px); /* Muda o efeito de lado pra cima no celular */
        }
        .detalhe-midia {
            height: 200px;
        }
    }
</style>
</head>
<body>

    <div class="header">
        <img src="https://raw.githubusercontent.com/mkv3ndas-boop/MK-VENDAS-/refs/heads/main/IMG-20260311-WA0040.jpg" alt="Logo MK Vendas">
        <h1>Catálogo de Contas</h1>
        <p>Escolha sua próxima conta gemada</p>
    </div>

    <div class="layout-elite">
        <div class="menu-lateral" id="menuLateral">
            </div>

        <div class="painel-detalhes" id="painelDetalhes">
            </div>
    </div>

    <div style="text-align: center;">
        <a href="index.html" class="btn-voltar">⬅ Voltar ao Início</a>
    </div>

<script>
    // ========================================================================
    // SEU INVENTÁRIO DE VENDAS (MANTIDO EXATAMENTE IGUAL)
    // ========================================================================

    const catalogoDeContas = [
        {
            titulo: "Conta 01",
            midia_url: "https://raw.githubusercontent.com/mkv3ndas-boop/MK-VENDAS-/refs/heads/main/Untitled%2003-12-2026%2008-49-17.png",
            preco: "R$ ???",
            descricao: "sem estoque :(",
            link_compra: "https://chat.whatsapp.com/ICN7SpbAFiMAnq2KYRjXur?mode=gi_t"
        },
        {
            titulo: "Conta 02",
            midia_url: "https://raw.githubusercontent.com/mkv3ndas-boop/MK-VENDAS-/refs/heads/main/Untitled%2003-12-2026%2008-49-17.png",
            preco: "R$ ???",
            descricao: "sem estoque :(",
            link_compra: "https://chat.whatsapp.com/ICN7SpbAFiMAnq2KYRjXur?mode=gi_t"
        },
        {
            titulo: "Conta 03",
            midia_url: "https://raw.githubusercontent.com/mkv3ndas-boop/MK-VENDAS-/refs/heads/main/Untitled%2003-12-2026%2008-49-17.png",
            preco: "R$ ???",
            descricao: "sem estoque :(",
            link_compra: "https://chat.whatsapp.com/ICN7SpbAFiMAnq2KYRjXur?mode=gi_t"
        },
        {
            titulo: "Conta 04",
            midia_url: "https://raw.githubusercontent.com/mkv3ndas-boop/MK-VENDAS-/refs/heads/main/Untitled%2003-12-2026%2008-49-17.png",
            preco: "R$ ???",
            descricao: "sem estoque :(",
            link_compra: "https://chat.whatsapp.com/ICN7SpbAFiMAnq2KYRjXur?mode=gi_t"
        },
        {
            titulo: "Conta 05",
            midia_url: "https://raw.githubusercontent.com/mkv3ndas-boop/MK-VENDAS-/refs/heads/main/Untitled%2003-12-2026%2008-49-17.png",
            preco: "R$ ???",
            descricao: "sem estoque :(",
            link_compra: "https://chat.whatsapp.com/ICN7SpbAFiMAnq2KYRjXur?mode=gi_t"
        }
    ];

    // ========================================================================
    // NOVA LÓGICA DO SCRIPT PARA TELA DIVIDIDA
    // ========================================================================

    const menuLateral = document.getElementById('menuLateral');
    const painelDetalhes = document.getElementById('painelDetalhes');

    // Função que atualiza o lado direito com os dados da conta clicada
    function mostrarDetalhesDaConta(conta) {
        painelDetalhes.innerHTML = `
            <img src="${conta.midia_url}" alt="Preview da ${conta.titulo}" class="detalhe-midia">
            <h2 class="detalhe-titulo">${conta.titulo}</h2>
            <div class="detalhe-preco">${conta.preco}</div>
            <p class="detalhe-descricao">${conta.descricao}</p>
            <a href="${conta.link_compra}" class="btn-comprar" target="_blank">🛒 Comprar Agora no WhatsApp</a>
        `;
    }

    // Cria os botões do lado esquerdo baseados na sua lista
    catalogoDeContas.forEach((conta, index) => {
        const botao = document.createElement('button');
        botao.className = 'btn-conta';
        botao.innerHTML = `🔥 ${conta.titulo}`;
        
        // Quando clicar no botão:
        botao.addEventListener('click', () => {
            // 1. Remove a cor vermelha de todos os botões
            document.querySelectorAll('.btn-conta').forEach(btn => btn.classList.remove('ativo'));
            // 2. Coloca a cor vermelha só no botão que foi clicado
            botao.classList.add('ativo');
            // 3. Atualiza o painel direito
            mostrarDetalhesDaConta(conta);
        });

        menuLateral.appendChild(botao);

        // Seleciona a primeira conta automaticamente quando a página carregar
        if (index === 0) {
            botao.classList.add('ativo');
            mostrarDetalhesDaConta(conta);
        }
    });

</script>

</body>
</html>
