<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MK VENDAS | Contas Free Fire</title>
<style>
    /* Importando uma fonte mais moderna e agressiva do Google Fonts */
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;1,900&display=swap');

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Montserrat', sans-serif;
        background-color: #0d0d0d;
        /* Luz vermelha sutil no topo da página */
        background-image: radial-gradient(circle at top, #330000 0%, #0d0d0d 60%);
        color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    .container {
        width: 100%;
        max-width: 400px;
        background: rgba(20, 20, 20, 0.8);
        padding: 40px 20px;
        border-radius: 20px;
        border: 1px solid #4a0000;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        text-align: center;
        backdrop-filter: blur(10px);
    }

    .logo-container {
        position: relative;
        display: inline-block;
    }

    .logo {
        width: 130px;
        height: 130px;
        border-radius: 50%;
        border: 4px solid #ff2a2a;
        object-fit: cover;
        /* Efeito visual da logo pulsando */
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0% { box-shadow: 0 0 10px rgba(255, 42, 42, 0.4); }
        50% { box-shadow: 0 0 25px rgba(255, 42, 42, 0.9); }
        100% { box-shadow: 0 0 10px rgba(255, 42, 42, 0.4); }
    }

    h1 {
        margin-top: 20px;
        font-size: 30px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-shadow: 3px 3px 0px #8a0000; /* Sombra dura para estilo gamer */
    }

    p {
        color: #cccccc;
        margin: 10px 0 30px;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 1px;
    }

    .links-container {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .link {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: linear-gradient(90deg, #990000, #ff2a2a);
        padding: 16px;
        border-radius: 12px;
        color: white;
        text-decoration: none;
        font-weight: bold;
        font-size: 16px;
        text-transform: uppercase;
        /* Transição com física de "bounce" (salto) */
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative;
        overflow: hidden;
        border: 1px solid #ff4d4d;
    }

    /* Linha de brilho que passa pelo botão */
    .link::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        transition: all 0.4s;
    }

    .link:hover {
        transform: translateY(-5px) scale(1.03);
        box-shadow: 0 10px 20px rgba(255, 42, 42, 0.5);
    }

    .link:hover::before {
        left: 100%;
    }

    .footer {
        margin-top: 35px;
        font-size: 12px;
        color: #555555;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
</style>
</head>

<body>

<div class="container">
    <div class="logo-container">
        <img class="logo" src="https://raw.githubusercontent.com/mkv3ndas-boop/MK-VENDAS-/refs/heads/main/IMG-20260311-WA0040.jpg" alt="Logo MK Vendas">
    </div>

    <h1>MK VENDAS</h1>
    <p>🔥 Venda de Contas Free Fire 🔥</p>

    <div class="links-container">
        <a class="link" href="https://chat.whatsapp.com/ICN7SpbAFiMAnq2KYRjXur?mode=gi_t" target="_blank">
            📱 Comprar no WhatsApp
        </a>

        <a class="link" href="https://discord.gg/K6fSBtFKT" target="_blank">
            🎮 Grupo no Discord
        </a>

        <a href="catalogo.html" target="_blank">
            🛍️ Ver Catálogo de Contas
        </a>
    </div>

    <div class="footer">
        © 2026 MK Vendas
    </div>
</div>

</body>
</html>
